services:
  api_server:
    image: node:26-alpine
    container_name: api_server
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      # 2. Anonymous volume: Prevents local node_modules from wiping out/overwriting container modules
      # - /app/node_modules
    working_dir: /app
    env_file:
      - .env 
    # environment:
